bundle:
  name: qsr-synth-data-generator

variables:
  catalog_name:
    default: jmrdemo
  num_units:
    default: "250"
  backfill_months:
    default: "1"
  live_tick_seconds:
    default: "3600"
  base_orders_per_unit_per_hour:
    default: "18"

workspace:
  profile: DEFAULT

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
  prod:
    mode: production
    workspace:
      profile: aws

include:
  - resources/*.yml
