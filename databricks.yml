bundle:
  name: qsr-synth-data-generator

variables:
  catalog_name:
    default: qsr_synth
  num_units:
    default: "250"
  backfill_months:
    default: "12"

workspace:
  host: https://e2-demo-field-eng.cloud.databricks.com

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: aws
  prod:
    mode: production
    workspace:
      profile: aws

include:
  - resources/*.yml
