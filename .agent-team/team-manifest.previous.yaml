project: qsr-synth-data-generator
mode: incremental
feature_description: >
  Implement Phase 2.5 (generator realism fixes: waste categories, loyalty redeem transactions,
  item status on cancellations, waste flags, order discounts, guest churn, AOV variance via
  per-unit price index + catering multiplier + quarterly price drift) and Phase 2 (catalog
  enrichment: table/column metadata, 5 metric views, Genie Space, setup_job wiring).
  Each phase runs on its own branch: feat/phase-25-generator-realism and feat/phase-2-catalog-enrichment.
previous_manifest: .agent-team/team-manifest.previous.yaml

plan_files:
  - docs/superpowers/plans/2026-05-18-phase-25-generator-realism.md
  - docs/superpowers/plans/2026-05-18-phase-2-catalog-enrichment.md

project_snapshot:
  structure:
    src_dirs:
      - src/generator/domains/  # order, inventory, loyalty, guest, workforce generators
      - src/generator/reference/ # us_locations, seeder, menu_catalog
      - src/generator/           # entity_registry, runner, demand_model, entropy, causal_context
      - src/pipeline/            # mvm_pipeline.py — DLT pipeline (14 silver + 4 gold tables)
      - src/setup/               # setup_notebook, destroy_notebook, unpause_generator_notebook
    resources:
      - resources/setup_job.yml
      - resources/generator_job.yml
      - resources/pipeline.yml
      - resources/destroy_job.yml
    tests:
      - tests/test_orders.py
      - tests/test_inventory.py
      - tests/test_guest_loyalty_workforce.py
      - tests/test_runner.py
      - tests/test_seeder.py
      - tests/test_entity_registry.py
      - tests/test_demand_model.py
      - tests/test_causal_context.py
      - tests/test_entropy.py
      - tests/test_us_locations.py
      - tests/test_smoke.py
    dab_config:
      targets: [dev (mode:development), prod (mode:production)]
      catalog_var: catalog_name
      pipeline: triggered mode (continuous disabled due to dev target)
  history:
    original_team: 9-agent 6-phase build team (all phases complete)
    introspection: null
    known_issues: []
  architecture:
    data_tables:
      - jmrdemo.staging.* (14 bronze staging tables)
      - jmrdemo.silver.* (14 silver + 4 gold via DLT)
      - jmrdemo.ref.* (unit, menu_item, recipe_ingredient, financial_period, supplier, item_price)
    endpoints: []
    app_routes: []
    frontend_pages: []

agents:
  - name: generator-realism-engineer
    type: dynamic
    registered_agent: .agent-team/agents/generator-realism-engineer.md
    model: sonnet
    phase: 1
    parallel_group: feature-work
    branch: feat/phase-25-generator-realism

  - name: catalog-enrichment-engineer
    type: dynamic
    registered_agent: .agent-team/agents/catalog-enrichment-engineer.md
    model: sonnet
    phase: 1
    parallel_group: feature-work
    branch: feat/phase-2-catalog-enrichment

  - name: qa-engineer
    type: curated
    registered_agent: agents/qa-engineer.md
    model: sonnet
    phase: 2
    parallel_group: qa

phases:
  - id: 1
    name: feature-implementation
    description: >
      Parallel implementation of Phase 2.5 (generator realism, 9 TDD tasks, pure Python)
      and Phase 2 (catalog enrichment, 5 tasks, setup notebooks + DAB deploy).
      Each engineer works on its own branch.
    agents: [generator-realism-engineer, catalog-enrichment-engineer]
    parallel_groups: [[generator-realism-engineer, catalog-enrichment-engineer]]

  - id: 2
    name: qa
    description: Validate both branches — pytest suite, contract compliance, bundle validate
    agents: [qa-engineer]
    parallel_groups: [[qa-engineer]]
    depends_on: [1]
