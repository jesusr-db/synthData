id: 4
name: setup-and-resources
description: >
  Assembles the complete deployable DAB project: setup/destroy notebooks,
  DAB resource YAML files, requirements.txt, and the final smoke test suite.
  Runs the full pytest suite to confirm zero failures. Tasks 15–17 of the plan.

depends_on: [3]

agents:
  - name: setup-engineer
    type: dynamic
    parallel_group: 1

inputs:
  - path: src/
    access: read-only
    description: All generator + pipeline source code from Phases 1–3
  - path: databricks.yml
    access: read-modify
    description: DAB bundle skeleton from Phase 1 to finalize
  - path: docs/superpowers/plans/2026-05-15-qsr-synthetic-data-generator.md
    access: read-only
    description: Tasks 15–17 specifications

outputs:
  - path: src/setup/setup_notebook.py
    description: Catalog/schema init + reference seeding + UC Metric Views
  - path: src/setup/destroy_notebook.py
    description: Full teardown of all non-DAB-managed resources
  - path: resources/pipeline.yml
    description: DLT pipeline DAB resource (continuous, PREVIEW channel)
  - path: resources/setup_job.yml
    description: One-time setup job DAB resource
  - path: resources/generator_job.yml
    description: Live generator job DAB resource (every-minute cron)
  - path: resources/destroy_job.yml
    description: Teardown job DAB resource
  - path: requirements.txt
    description: Python dependencies with pinned versions
  - path: tests/test_smoke.py
    description: End-to-end smoke tests validating all event types + FK integrity

qa_scope:
  phase: 4
  checks:
    - type: artifact_exists
      description: All resource YAML files exist in resources/
    - type: artifact_exists
      description: requirements.txt exists with faker, numpy, python-dateutil, pyyaml, pytest
    - type: artifact_exists
      description: tests/test_smoke.py exists and pytest tests/ -v shows 0 failures
    - type: schema_match
      description: setup_notebook.py creates all 5 staging tables + seeds ref data
    - type: schema_match
      description: All resource files use ${var.catalog_name} not hardcoded values
