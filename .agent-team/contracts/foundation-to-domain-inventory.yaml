name: foundation-to-domain-inventory
producer: foundation-engineer
consumer: domain-inventory-engineer
consumed_in_phase: 2

artifacts:
  - path: src/generator/causal_context.py
    access: read-only
    description: CausalContext dataclass + build_context()
  - path: src/generator/entropy.py
    access: read-only
    description: gaussian_noise and other noise helpers
  - path: src/generator/entity_registry.py
    access: read-only
    description: EntityRegistry — FK lookup for unit_id, item_id
  - path: src/generator/reference/menu_catalog.py
    access: read-only
    description: get_menu_items(), get_recipe_ingredients()
  - path: src/generator/reference/us_locations.py
    access: read-only
    description: generate_units() — 250 US QSR locations
  - path: tests/conftest.py
    access: read-only
    description: Shared pytest fixtures

outputs:
  - path: src/generator/domains/inventory.py
    description: generate_inventory_events() + generate_daily_receiving()
  - path: tests/test_inventory.py
    description: pytest suite for inventory domain

schemas:
  on_hand_balance:
    event_type: on_hand_balance
    fields:
      - name: balance_id
        type: str
        required: true
      - name: unit_id
        type: str
        required: true
        description: FK → entity_registry units
      - name: item_id
        type: str
        required: true
        description: FK → menu_catalog items
      - name: snapshot_ts
        type: datetime
        required: true
      - name: quantity_on_hand
        type: float
        required: true
      - name: par_level
        type: float
        required: true

  waste_log:
    event_type: waste_log
    fields:
      - name: waste_id
        type: str
        required: true
      - name: unit_id
        type: str
        required: true
      - name: item_id
        type: str
        required: true
      - name: waste_ts
        type: datetime
        required: true
      - name: quantity_wasted
        type: float
        required: true
      - name: reason
        type: str
        required: true
        description: expired, spoiled, dropped, overproduction

  replenishment_order:
    event_type: replenishment_order
    fields:
      - name: replenishment_id
        type: str
        required: true
      - name: unit_id
        type: str
        required: true
      - name: item_id
        type: str
        required: true
      - name: order_ts
        type: datetime
        required: true
      - name: quantity_ordered
        type: float
        required: true
      - name: trigger_reason
        type: str
        required: true
        description: below_par (25% threshold), scheduled_order

  receiving_order:
    event_type: receiving_order
    fields:
      - name: receiving_id
        type: str
        required: true
      - name: replenishment_id
        type: str
        required: false
        description: FK → replenishment_order when applicable
      - name: unit_id
        type: str
        required: true
      - name: item_id
        type: str
        required: true
      - name: received_ts
        type: datetime
        required: true
      - name: quantity_received
        type: float
        required: true

validation:
  - type: artifact_exists
    description: src/generator/domains/inventory.py exists
  - type: artifact_exists
    description: tests/test_inventory.py exists and pytest passes
  - type: schema_match
    description: generate_inventory_events returns list[dict] each with event_type key
  - type: schema_match
    description: waste_log quantity skewed toward late-night hours (11pm–3am)
