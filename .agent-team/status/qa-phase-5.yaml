fixes_applied:
  - "tests/test_demand_model.py::test_dinner_friday_more_than_monday_morning —
    changed tick_seconds from 60 to 3600. Root cause: at 60-second tick, both
    Friday-dinner (effective_volume=36.54) and Monday-morning (effective_volume=2.70)
    produce raw values < 0.7 before Gaussian noise, both rounding to 0. At a 1-hour
    tick the values are ~51 vs ~3, unambiguous. The test intent was correct but the
    tick size made it a 0-vs-0 comparison."

concerns:
  - "digital_account DLT Silver table reads from guest_events filtered on
    event_type=='guest_profile' (same filter as guest_profile table). This is correct
    because guest.py embeds digital_account fields in the guest_profile event (1:1),
    but it means the two Silver tables are not independently addressable by event_type.
    Low risk for current design, worth noting if the schema evolves to separate events."

